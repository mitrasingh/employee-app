<!-- dashboard.component.html -->
<div class="dashboard">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Dashboard</h1>
      <p class="header-subtitle">Welcome back, here's what's happening today</p>
    </div>
    <button class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0v16M0 8h16" stroke="currentColor" stroke-width="2" />
      </svg>
      Add Employee
    </button>
  </header>

  <!-- Quick Stats Cards -->
  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
          />
        </svg>
      </div>
      <div class="stat-content">
        <p class="stat-label">Total Employees</p>
        <h2 class="stat-value">{{ employeeCount$ | async }}</h2>
        <p class="stat-change positive">Company-wide</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
        </svg>
      </div>
      <div class="stat-content">
        <p class="stat-label">Newest Hire</p>
        <h2 class="stat-value">XX</h2>
        <p class="stat-change positive">XXE</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon purple">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4z" />
        </svg>
      </div>
      <div class="stat-content">
        <p class="stat-label">Departments</p>
        <h2 class="stat-value">XX</h2>
        <p class="stat-change neutral">Across locationsCount locations</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon orange">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"
          />
        </svg>
      </div>
      <div class="stat-content">
        <p class="stat-label">Avg. Tenure</p>
        <h2 class="stat-value">3.2 yrs</h2>
        <p class="stat-change positive">Company-wide</p>
      </div>
    </div>
  </section>
</div>
